server {
    listen 80;
    server_name domain1.com;

    location / {
        proxy_pass http://backend_server1;
        # Other proxy settings if needed
    }
}

server {
    listen 443;
    server_name domain2.com;
    ssl_certificate /etc/nginx/certs/proxy_server.crt;
    ssl_certificate_key /etc/nginx/certs/proxy_server.key;
    
    location / {
        proxy_pass http://backend_server2;
        # Other proxy settings if needed
    }
}

server {
    listen        80;
    server_name   example.com *.example.com;
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Add more server blocks for additional domains


stream {
    map $ssl_preread_server_name $backend {
        domain1.com backend_server1:443;
        domain2.com backend_server2:443;
        # Add more mappings for additional domains and backend addresses
        default backend_default:443;
    }

    server {
        listen 443;
        proxy_pass $backend;
        ssl_preread on;

        # SSL certificate and key for the proxy server
        ssl_certificate /etc/nginx/certs/proxy_server.crt;
        ssl_certificate_key /etc/nginx/certs/proxy_server.key;
    }
}
